{% extends 'staff/base.html' %}

{% block content %}
    <h1>{% if object %} Update{% else %} Create {% endif %} Role Play Scenario</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'staff:role_play_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
