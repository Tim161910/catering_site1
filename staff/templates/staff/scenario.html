<<!DOCTYPE html>
<html>
<head>
    <title>Scenario</title>
    <style>
        textarea[name="action"] {
            width: 100%;
            height: 200px;
        }
    </style>
</head>
<body>
    <h1>{{ roleplay.name }}</h1>
    <p>{{ roleplay.scenario }}</p>
    <form method="post">
        {% csrf_token %}
        <textarea name="action" style="width: 100%; height: 300px;" placeholder="Enter your action..."></textarea>
        <button type="submit">Submit Action</button>
    </form>
    <p>Last action: {{ action }}</p>
</body>
</html>
