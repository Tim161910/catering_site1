<!DOCTYPE html>
<html>
<head>
    <title>Catering Staff</title>
    <meta charset="utf-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
    
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'staff:event_list' %}">Staff Manager</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'staff:event_list' %}">Events</a>
                <a class="nav-link" href="{% url 'staff:staff_list' %}">Staff</a>
                <a class="nav-link" href="{% url 'staff:recruitment_list' %}">Recruitment</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- JS: jQuery first, then Bootstrap, then Select2, then Flatpickr -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script>
    // CSRF helper
    function getCSRFToken() {
        return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    }

    $(document).ready(function() {
        // Select2 for all dropdowns
        $('select.form-control').select2({
            theme: 'bootstrap-5',
            width: '100%',
            placeholder: '-- Select --',
            allowClear: true
        });
        
        // Flatpickr for deadline with time
        $('input[name="deadline"]').flatpickr({
            enableTime: true,
            dateFormat: "d/m/Y H:i",
            time_24hr: true,
            altInput: true,
            altFormat: "d/m/Y H:i"
        });

        // Your existing assignment/reassign code
        let currentAssignmentId = null;
        let currentNewStaffId = null;

        window.reassign = function(assignmentId, newStaffId, event) {
          if (!newStaffId) return;
          currentAssignmentId = assignmentId;
          currentNewStaffId = newStaffId;
          document.getElementById('reassignReason').value = '';
          event.target.selectedIndex = 0;
          new bootstrap.Modal(document.getElementById('reassignModal')).show();
        }

        window.updateRole = function(assignmentId, roleId) {
          fetch(`/staff/update-assignment-role/${assignmentId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
            },
            body: JSON.stringify({ role_id: roleId })
          })
          .then(res => res.json())
          .then(data => {
                  if (!data.success) alert('Failed to update role: ' + data.error);
            });
        }

        $('#confirmReassign').on('click', async () => {
          const reason = document.getElementById('reassignReason').value.trim();
          if (!reason) {
            alert('Please enter a reason for reassignment');
            return;
          }

          const res = await fetch(`/staff/api/assignments/${currentAssignmentId}/reassign/`, {
            method: 'POST',
            headers: {
              'X-CSRFToken': getCSRFToken(),
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({new_staff_id: currentNewStaffId, reason: reason})
          });

          if (res.ok) {
            location.reload();
          } else {
            alert('Failed to reassign');
          }
        });
    });
    </script>
</body>
</html>
