<!DOCTYPE html>
<html>
<head>
    <title>Staff</title>
    <meta charset="utf-8">
    <meta name="csrf-token" content="{{ csrf_token }}">  
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />  
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card ul {
            list-style: none;
            padding-left: 0;
        }
        .card li {
            background: #f0f0f0;
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'staff:dashboard' %}">Staff Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav">
                    <a class="nav-link" href="{% url 'staff:event_list' %}">Events</a>
                    <a class="nav-link" href="{% url 'staff:staff_list' %}">Staff</a>
                    <a class="nav-link" href="{% url 'staff:recruitment_list' %}">Recruitment</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>

    <script>
    $(document).ready(function() {
        // 1. Select2 - safe to run on all pages
        $('select.form-control').select2({
            theme: 'bootstrap-5',
            width: '100%',
            placeholder: '-- Select --',
            allowClear: true 
        });
    
        // 2. Flatpickr - safe to run on all pages
        $('input[name="deadline"]').flatpickr({
            enableTime: true,
            dateFormat: "d/m/Y H:i",
            time_24hr: true,
            allowInput: true
        });

        // 3. Reassign code - ONLY run if modal exists on this page
        const reassignModalEl = document.getElementById('reassignModal');
        if (reassignModalEl) {
            const reassignModal = new bootstrap.Modal(reassignModalEl);
            let currentAssignmentId = null;
            let currentNewStaffId = null;

            window.reassign = function(assignmentId, newStaffId, event) {
                if (!newStaffId) return;
                currentAssignmentId = assignmentId;
                currentNewStaffId = newStaffId;
                document.getElementById('reassignReason').value = '';
                event.target.selectedIndex = 0;
                reassignModal.show();
           }

            $('#confirmReassign').on('click', async () => {
                const reason = document.getElementById('reassignReason').value.trim();
                if (!reason) {
                    alert('Please enter a reason for reassignment');
                    return;
                }
                const res = await fetch(`/staff/api/assignments/${currentAssignmentId}/reassign/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCSRFToken(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({new_staff_id: currentNewStaffId, reason: reason})
                });
                if (res.ok) location.reload();
                else alert('Failed to reassign');
            });
        }

        window.updateRole = function(assignmentId, roleId) {
            fetch(`/staff/update-assignment-role/${assignmentId}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken(),
                },
                body: JSON.stringify({ role_id: roleId })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.success) alert('Failed to update role: ' + data.error);
           });
       }
    });

    function getCSRFToken() {
        return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    }
    </script>
    
</body>
</html>
